<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--Bootstrap link-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!--font awesome link-->
    <script src="https://kit.fontawesome.com/a8a9f2565e.js" crossorigin="anonymous"></script>

    <!--CSS link-->
    <link rel="stylesheet" href="style.css">

    <title>Compliant Plumbing</title>
</head>
<body>

    <!--Durandt section-->

    <!--Navbar section-->

    <header>
        <div class="px-3 py-2 text-bg-dark border-bottom">
            <div class="container">
                <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">
                    <a href="/" class="d-flex align-items-center my-2 my-lg-0 me-lg-auto text-white text-decoration-none">
                        <img src="Images/Logo.jpg" class="logo" alt="Compliant Plumbing Logo">
                    </a>
                    <ul class="nav col-12 col-lg-auto my-2 justify-content-center my-md-0 text-small">
                        <li>
                            <a href="#" class="nav-link text-white">
                                <svg class="bi d-block mx-auto mb-1" width="24" height="24" aria-hidden="true">
                                    <use xlink:href="#home"></use>
                                </svg>
                                Home
                            </a>
                        </li>
                        <li>
                            <a href="#" class="nav-link text-white">
                                <svg class="bi d-block mx-auto mb-1" width="24" height="24" aria-hidden="true">
                                    <use xlink:href="#table"></use>
                                </svg>
                                About
                            </a>
                        </li>
                        <li>
                            <a href="#" class="nav-link text-white">
                                <svg class="bi d-block mx-auto mb-1" width="24" height="24" aria-hidden="true">
                                    <use xlink:href="#grid"></use>
                                </svg>
                                Services
                            </a>
                        </li>
                        <li>
                            <a href="#" class="nav-link text-white">
                                <svg class="bi d-block mx-auto mb-1" width="24" height="24" aria-hidden="true">
                                    <use xlink:href="#people-circle"></use>
                                </svg>
                                Contact
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </header>
    
    <!--Hero section-->

    <!--Contact section-->
    <div class="container py-5">
        <div class="row g-4">

            <!--contact information-->
            <div class="col-lg-5">
                <p class="text-primary fw-bold">CONTACT US</p>
                <h2 class="display-3 fw-bold">
                    Need Assistance? <br>
                    Reach out
                </h2>

                <!--Phone number-->
                <div class="d-flex mb-5">
                    <div class="icon-box me-4">
                        <i class="fa-solid fa-phone"></i>
                    </div>
                    <div>
                        <h4>Company Phone</h4>
                        <h3 class="text-primary"> +27 65 917 9997</h3>
                    </div>
                </div>

                <!--Email-->
                <div class="d-flex mb-5">
                    <div class="icon-box me-4">
                        <i class="fa-regular fa-envelope-open"></i>
                    </div>
                    <div>
                        <h4>Company Email</h4>
                        <h3 class="text-primary"> compliantplumb@gmail.com </h3>
                    </div>
                </div>

                <!--Address-->
                <div class="d-flex mb-5">
                    <div class="icon-box me-4">
                        <i class="fa-solid fa-location-dot"></i>
                    </div>
                    <div>
                        <h4>Company Address</h4>
                        <h3 class="text-primary"> Corner Waterloo &, Emden Rd, Primrose, Germiston, 1401 </h3>
                    </div>
                </div>
            </div>

            <!--Contact form-->
            <div class="col-lg-7">
                <!--Basic for the form-->
                <div class="mb-3">
                    <label for="exampleFormControlInput1" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="name@example.com">
                </div>
                <div class="mb-3">
                    <label for="exampleFormControlTextarea1" class="form-label">Example textarea</label>
                    <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
                </div>
            </div>
        </div>
    </div>

    <!--Footer section-->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
